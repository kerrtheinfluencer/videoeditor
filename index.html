<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Video Editor v4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Simple Header */
        .header {
            height: 50px;
            background: #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #333;
        }

        .btn {
            background: #007AFF;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:active { opacity: 0.8; }
        .btn.secondary { background: #333; }
        .btn.danger { background: #ff3b30; }

        /* Video Area */
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            max-height: 60vh;
            object-fit: contain;
            background: #000;
        }

        .empty-state {
            position: absolute;
            text-align: center;
            color: #666;
            pointer-events: none;
        }

        /* Controls */
        .controls {
            background: #1c1c1e;
            padding: 15px;
            border-top: 1px solid #333;
        }

        .scrubber {
            width: 100%;
            height: 40px;
            margin-bottom: 15px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 4px;
            outline: none;
        }

        .scrubber::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 40px;
            background: #007AFF;
            border-radius: 4px;
            cursor: pointer;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #2c2c2e;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn.primary { background: #007AFF; }

        .time {
            font-family: monospace;
            font-size: 14px;
            color: #8e8e93;
            min-width: 100px;
            text-align: center;
        }

        /* Timeline */
        .timeline {
            height: 100px;
            background: #000;
            border-top: 1px solid #333;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .clip {
            height: 80px;
            background: #2c2c2e;
            border: 2px solid transparent;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 80px;
            padding: 10px;
            font-size: 12px;
            color: #8e8e93;
            position: relative;
            overflow: hidden;
        }

        .clip.active { border-color: #007AFF; background: #1c1c1e; }
        .clip img { height: 100%; width: auto; object-fit: cover; }

        /* Tools */
        .tools {
            height: 60px;
            background: #1c1c1e;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
        }

        .tool {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
        }

        .tool.active { color: #007AFF; }
        .tool span { font-size: 20px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            padding: 20px;
            flex-direction: column;
        }

        .modal.active { display: flex; }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .close { font-size: 24px; background: none; border: none; color: #fff; }

        .file-input-wrapper {
            margin: 20px 0;
        }

        input[type="file"] {
            width: 100%;
            padding: 15px;
            background: #2c2c2e;
            border: 2px dashed #444;
            border-radius: 8px;
            color: #fff;
        }

        /* Debug */
        .debug {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 5px;
            max-height: 100px;
            overflow-y: auto;
            z-index: 5000;
            display: none;
        }

        .debug.active { display: block; }

        .error-msg {
            background: #ff3b30;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn secondary" onclick="showImport()">Import</button>
        <div>Video Editor</div>
        <button class="btn" onclick="exportVideo()">Export</button>
    </div>

    <div class="video-container">
        <video id="player" playsinline></video>
        <div class="empty-state" id="empty">
            <div style="font-size: 48px; margin-bottom: 10px;">🎬</div>
            <div>Tap Import to add video</div>
        </div>
    </div>

    <div class="controls">
        <input type="range" class="scrubber" id="scrubber" min="0" max="100" value="0" step="0.1">
        <div class="control-row">
            <button class="control-btn" onclick="skip(-5)">⏮</button>
            <button class="control-btn primary" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="control-btn" onclick="skip(5)">⏭</button>
            <div class="time" id="time">00:00 / 00:00</div>
        </div>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="tools">
        <button class="tool active" onclick="setTool('select')">
            <span>👆</span>
            <div>Select</div>
        </button>
        <button class="tool" onclick="setTool('split')">
            <span>✂️</span>
            <div>Split</div>
        </button>
        <button class="tool" onclick="setTool('trim')">
            <span>⏱</span>
            <div>Trim</div>
        </button>
        <button class="tool" onclick="toggleWatermark()">
            <span>💧</span>
            <div>Mark</div>
        </button>
        <button class="tool danger" onclick="deleteClip()">
            <span>🗑</span>
            <div>Del</div>
        </button>
    </div>

    <!-- Import Modal -->
    <div class="modal" id="importModal">
        <div class="modal-header">
            <span>Import Media</span>
            <button class="close" onclick="hideModal()">&times;</button>
        </div>
        
        <div id="errorContainer"></div>

        <div class="file-input-wrapper">
            <input type="file" id="fileInput" accept="video/*" onchange="handleFile(event)">
        </div>

        <button class="btn" onclick="loadDemo()" style="width: 100%; margin-top: 10px; background: #333;">
            Load Demo Video
        </button>

        <div style="margin-top: 20px; color: #666; font-size: 12px; line-height: 1.5;">
            <strong>Debug Info:</strong><br>
            <span id="debugInfo">Waiting for file...</span>
        </div>
    </div>

    <!-- Watermark Modal -->
    <div class="modal" id="watermarkModal">
        <div class="modal-header">
            <span>Watermark</span>
            <button class="close" onclick="hideModal()">&times;</button>
        </div>
        <input type="text" id="wmText" value="© My Video" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #333; border: none; color: white; border-radius: 6px;">
        <button class="btn" onclick="applyWatermark()" style="width: 100%;">Apply</button>
    </div>

    <div class="debug" id="debug"></div>

    <script>
        // Simple State
        let clips = [];
        let currentClip = null;
        let isPlaying = false;
        let currentTool = 'select';
        let watermark = { text: '', enabled: false };

        // Elements
        const player = document.getElementById('player');
        const scrubber = document.getElementById('scrubber');
        const playBtn = document.getElementById('playBtn');
        const timeDisplay = document.getElementById('time');
        const timeline = document.getElementById('timeline');
        const empty = document.getElementById('empty');
        const debugInfo = document.getElementById('debugInfo');

        function log(msg) {
            console.log(msg);
            debugInfo.innerHTML += '<br>' + msg;
        }

        function showError(msg) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="error-msg">${msg}</div>`;
            log('ERROR: ' + msg);
        }

        // Event Listeners
        player.addEventListener('timeupdate', updateUI);
        player.addEventListener('loadedmetadata', () => {
            scrubber.max = player.duration;
            updateUI();
            log('Video loaded, duration: ' + player.duration);
        });
        player.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.textContent = '▶';
        });
        player.addEventListener('error', (e) => {
            showError('Video error: ' + player.error.message);
        });

        scrubber.addEventListener('input', (e) => {
            player.currentTime = parseFloat(e.target.value);
        });

        // Import
        function showImport() {
            document.getElementById('importModal').classList.add('active');
            document.getElementById('errorContainer').innerHTML = '';
            log('Import opened');
        }

        function hideModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function handleFile(event) {
            log('File selected');
            const file = event.target.files[0];
            if (!file) {
                showError('No file selected');
                return;
            }

            log('File: ' + file.name + ' (' + file.size + ' bytes)');

            if (!file.type.startsWith('video/')) {
                showError('Please select a video file');
                return;
            }

            const url = URL.createObjectURL(file);
            log('Created blob URL');
            
            loadVideo(url, file.name);
            hideModal();
        }

        function loadVideo(url, name) {
            log('Loading video...');
            
            player.src = url;
            player.load();
            
            const clip = {
                id: Date.now(),
                name: name,
                url: url,
                start: 0,
                end: 0,
                duration: 0
            };
            
            clips.push(clip);
            currentClip = clip;
            
            player.onloadedmetadata = () => {
                clip.duration = player.duration;
                clip.end = player.duration;
                empty.style.display = 'none';
                renderTimeline();
                log('Video ready: ' + player.videoWidth + 'x' + player.videoHeight);
            };
        }

        function loadDemo() {
            log('Creating demo...');
            // Create a simple test video using canvas
            const c = document.createElement('canvas');
            c.width = 640;
            c.height = 360;
            const ctx = c.getContext('2d');
            
            const stream = c.captureStream(30);
            const mediaRecorder = new MediaRecorder(stream);
            const chunks = [];
            
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                loadVideo(url, 'Demo Video');
            };
            
            mediaRecorder.start();
            
            // Draw 3 seconds of animation
            let frame = 0;
            const draw = setInterval(() => {
                frame++;
                ctx.fillStyle = `hsl(${frame * 4}, 70%, 50%)`;
                ctx.fillRect(0, 0, 640, 360);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Demo Video', 320, 180);
                ctx.font = '20px Arial';
                ctx.fillText('Frame ' + frame, 320, 220);
                
                if (frame >= 90) { // 3 seconds
                    clearInterval(draw);
                    mediaRecorder.stop();
                }
            }, 33);
            
            hideModal();
        }

        // Playback
        function togglePlay() {
            if (!player.src) {
                alert('Import a video first');
                return;
            }
            
            if (player.paused) {
                player.play().then(() => {
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    log('Playing');
                }).catch(err => {
                    showError('Cannot play: ' + err.message);
                });
            } else {
                player.pause();
                isPlaying = false;
                playBtn.textContent = '▶';
                log('Paused');
            }
        }

        function skip(seconds) {
            if (!player.src) return;
            player.currentTime += seconds;
        }

        function updateUI() {
            scrubber.value = player.currentTime;
            const cur = formatTime(player.currentTime);
            const dur = formatTime(player.duration || 0);
            timeDisplay.textContent = `${cur} / ${dur}`;
        }

        function formatTime(s) {
            if (!isFinite(s)) return '00:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        // Timeline
        function renderTimeline() {
            timeline.innerHTML = '';
            clips.forEach((clip, index) => {
                const div = document.createElement('div');
                div.className = 'clip' + (clip === currentClip ? ' active' : '');
                div.style.width = Math.max(100, clip.duration * 10) + 'px';
                div.textContent = clip.name.substring(0, 10);
                div.onclick = () => selectClip(index);
                timeline.appendChild(div);
            });
        }

        function selectClip(index) {
            currentClip = clips[index];
            player.src = currentClip.url;
            player.load();
            renderTimeline();
            log('Selected clip: ' + currentClip.name);
        }

        // Tools
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            log('Tool: ' + tool);
        }

        function toggleWatermark() {
            document.getElementById('watermarkModal').classList.add('active');
        }

        function applyWatermark() {
            watermark.text = document.getElementById('wmText').value;
            watermark.enabled = true;
            hideModal();
            log('Watermark applied: ' + watermark.text);
        }

        function deleteClip() {
            if (!currentClip) return;
            if (confirm('Delete this clip?')) {
                const idx = clips.indexOf(currentClip);
                clips.splice(idx, 1);
                if (clips.length > 0) {
                    selectClip(0);
                } else {
                    player.src = '';
                    empty.style.display = 'block';
                    currentClip = null;
                }
                renderTimeline();
            }
        }

        // Export
        function exportVideo() {
            if (!player.src) {
                alert('Nothing to export');
                return;
            }
            
            alert('Export feature: This would combine all clips into one video. In this demo, right-click the video and select "Save Video As" to download the current clip.');
        }

        // Handle tool buttons properly
        document.querySelectorAll('.tool').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
