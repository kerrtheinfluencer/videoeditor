<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ProVideo v3 - Functional Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #000;
            --surface: #1c1c1e;
            --accent: #007AFF;
            --text: #fff;
            --text-secondary: #8e8e93;
            --danger: #FF3B30;
            --success: #34C759;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            height: 44px;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid #333;
            z-index: 100;
        }

        .header h1 { font-size: 17px; font-weight: 600; }

        .header-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .header-btn:disabled { opacity: 0.5; }

        /* Preview Area */
        .preview-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .placeholder {
            position: absolute;
            text-align: center;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .placeholder-icon { font-size: 48px; margin-bottom: 12px; }

        /* Controls */
        .controls {
            height: 80px;
            background: var(--surface);
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 0 20px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: #2c2c2e;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .control-btn:active { transform: scale(0.95); background: #3a3a3c; }

        .control-btn.primary { background: var(--accent); }

        .control-btn.danger { background: var(--danger); }

        .time-display {
            position: absolute;
            left: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Timeline */
        .timeline-section {
            height: 120px;
            background: var(--surface);
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .timeline-toolbar {
            height: 36px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #333;
        }

        .tool-btn {
            background: #2c2c2e;
            border: none;
            color: var(--text);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }

        .tool-btn.active { background: var(--accent); }

        .timeline-track {
            flex: 1;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            background: #000;
        }

        .timeline-content {
            height: 100%;
            position: relative;
            min-width: 100%;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .clip-block {
            height: 60px;
            background: #2c2c2e;
            border: 2px solid transparent;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 11px;
        }

        .clip-block.active { border-color: var(--accent); background: #1c1c1e; }

        .clip-block.video { background: #0d1b2a; }
        .clip-block.audio { background: #1a0d1a; }
        
        .clip-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .clip-label {
            position: absolute;
            bottom: 2px;
            left: 4px;
            font-size: 10px;
            background: rgba(0,0,0,0.8);
            padding: 1px 4px;
            border-radius: 2px;
            pointer-events: none;
        }

        .playhead {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            pointer-events: none;
            z-index: 10;
        }

        .playhead::before {
            content: '▲';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent);
            font-size: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: #333;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
        }

        .modal-content {
            flex: 1;
            overflow-y: auto;
        }

        .option-row {
            background: #1c1c1e;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option-label { font-size: 16px; }

        .option-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"], input[type="number"] {
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            width: 120px;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 20px;
        }

        .action-btn.danger { background: var(--danger); }

        .action-btn:disabled { opacity: 0.5; }

        /* Progress */
        .progress-container {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .progress-container.active { display: flex; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <button class="header-btn" onclick="showImport()" style="background: #333;">Import</button>
        <h1>ProVideo Editor</h1>
        <button class="header-btn" onclick="showExport()">Export</button>
    </div>

    <!-- Preview -->
    <div class="preview-container">
        <video id="videoPlayer" playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        
        <div class="placeholder" id="placeholder">
            <div class="placeholder-icon">🎬</div>
            <div>Tap Import to add video</div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
        
        <button class="control-btn" onclick="skip(-5)">⏮</button>
        <button class="control-btn primary" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="skip(5)">⏭</button>
        
        <button class="control-btn danger" onclick="splitAtPlayhead()" style="margin-left: 20px;">✂️</button>
    </div>

    <!-- Timeline -->
    <div class="timeline-section">
        <div class="timeline-toolbar">
            <button class="tool-btn" onclick="setTool('select')" id="btnSelect">Select</button>
            <button class="tool-btn" onclick="setTool('split')" id="btnSplit">Split</button>
            <button class="tool-btn" onclick="showWatermark()">Watermark</button>
            <button class="tool-btn" onclick="showSpeed()">Speed</button>
            <button class="tool-btn danger" onclick="deleteSelected()">Delete</button>
        </div>
        
        <div class="timeline-track" id="timelineTrack">
            <div class="playhead"></div>
            <div class="timeline-content" id="timelineContent">
                <!-- Clips go here -->
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div class="modal" id="importModal">
        <div class="modal-header">
            <span>Import Media</span>
            <button class="close-btn" onclick="hideModal('importModal')">×</button>
        </div>
        <div class="modal-content">
            <input type="file" id="fileInput" accept="video/*,image/*,audio/*" style="display: none" onchange="handleFileSelect(event)">
            <button class="action-btn" onclick="document.getElementById('fileInput').click()">📁 Choose from Device</button>
            <button class="action-btn" onclick="importSample()" style="background: #333; margin-top: 10px;">🎬 Load Sample</button>
        </div>
    </div>

    <!-- Watermark Modal -->
    <div class="modal" id="watermarkModal">
        <div class="modal-header">
            <span>Watermark</span>
            <button class="close-btn" onclick="hideModal('watermarkModal')">×</button>
        </div>
        <div class="modal-content">
            <div class="option-row">
                <span class="option-label">Enable</span>
                <input type="checkbox" id="wmEnabled" onchange="toggleWatermark()">
            </div>
            <div class="option-row">
                <span class="option-label">Text</span>
                <input type="text" id="wmText" value="© My Video" oninput="updateWatermark()">
            </div>
            <div class="option-row">
                <span class="option-label">Opacity</span>
                <input type="range" min="0" max="1" step="0.1" value="0.7" id="wmOpacity" oninput="updateWatermark()" style="width: 100px;">
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div class="modal" id="exportModal">
        <div class="modal-header">
            <span>Export Video</span>
            <button class="close-btn" onclick="hideModal('exportModal')">×</button>
        </div>
        <div class="modal-content">
            <div class="option-row">
                <span class="option-label">Quality</span>
                <select id="exportQuality" style="background: #333; color: white; border: none; padding: 8px; border-radius: 6px;">
                    <option value="1080">1080p HD</option>
                    <option value="720">720p</option>
                    <option value="480">480p</option>
                </select>
            </div>
            <button class="action-btn" onclick="startExport()" id="exportActionBtn">Start Export</button>
        </div>
    </div>

    <!-- Progress Overlay -->
    <div class="progress-container" id="progressOverlay">
        <div class="progress-text">Exporting...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="progressDetail">0%</div>
        <button class="action-btn danger" onclick="cancelExport()" style="margin-top: 30px;">Cancel</button>
    </div>

    <script>
        // State
        const state = {
            clips: [],
            currentClipIndex: -1,
            isPlaying: false,
            tool: 'select',
            watermark: { enabled: false, text: '© My Video', opacity: 0.7, x: 0.8, y: 0.9 },
            exportInProgress: false
        };

        // Elements
        const video = document.getElementById('videoPlayer');
        const canvas = document.getElementById('overlayCanvas');
        const ctx = canvas.getContext('2d');
        const timelineContent = document.getElementById('timelineContent');
        const playBtn = document.getElementById('playBtn');
        const timeDisplay = document.getElementById('timeDisplay');

        // Initialize
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            video.addEventListener('timeupdate', onTimeUpdate);
            video.addEventListener('ended', onVideoEnded);
            video.addEventListener('loadedmetadata', () => {
                updateTimeDisplay();
                renderOverlay();
            });
            
            // Set initial tool
            setTool('select');
        }

        function resizeCanvas() {
            const container = document.querySelector('.preview-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            renderOverlay();
        }

        // File Import
        function showImport() {
            document.getElementById('importModal').classList.add('active');
        }

        function hideModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            await loadFile(file);
            hideModal('importModal');
        }

        async function loadFile(file) {
            const url = URL.createObjectURL(file);
            const type = file.type.startsWith('video/') ? 'video' : 
                        file.type.startsWith('image/') ? 'image' : 'audio';
            
            console.log('Loading file:', file.name, 'Type:', type);
            
            const clip = {
                id: Date.now(),
                type: type,
                url: url,
                file: file,
                name: file.name,
                duration: 0,
                start: 0,
                end: 0,
                trimStart: 0,
                trimEnd: 0
            };

            if (type === 'video') {
                // Get duration
                const tempVideo = document.createElement('video');
                tempVideo.src = url;
                await new Promise(resolve => {
                    tempVideo.onloadedmetadata = () => {
                        clip.duration = tempVideo.duration;
                        clip.end = tempVideo.duration;
                        clip.trimEnd = tempVideo.duration;
                        resolve();
                    };
                    tempVideo.onerror = () => {
                        alert('Error loading video');
                        resolve();
                    };
                });
            } else if (type === 'image') {
                clip.duration = 5; // 5 seconds default for images
                clip.end = 5;
                clip.trimEnd = 5;
            }

            // If first clip, load immediately
            if (state.clips.length === 0) {
                state.clips.push(clip);
                loadClipIntoPlayer(clip);
            } else {
                // Add to end
                const lastClip = state.clips[state.clips.length - 1];
                clip.start = lastClip.end;
                clip.end = clip.start + clip.duration;
                state.clips.push(clip);
            }
            
            state.currentClipIndex = 0;
            renderTimeline();
            document.getElementById('placeholder').classList.add('hidden');
        }

        function loadClipIntoPlayer(clip) {
            if (clip.type === 'video') {
                video.src = clip.url;
                video.currentTime = clip.trimStart || 0;
                video.load();
            } else if (clip.type === 'image') {
                // For images, we show a black video with image overlay handled in canvas
                video.src = '';
                video.poster = clip.url;
            }
            updateTimeDisplay();
        }

        // Playback Controls
        function togglePlay() {
            if (state.clips.length === 0) {
                alert('Import a video first');
                return;
            }
            
            if (video.paused) {
                video.play().then(() => {
                    state.isPlaying = true;
                    playBtn.textContent = '⏸';
                    renderOverlayLoop();
                }).catch(err => {
                    console.error('Play error:', err);
                    alert('Cannot play video: ' + err.message);
                });
            } else {
                video.pause();
                state.isPlaying = false;
                playBtn.textContent = '▶';
            }
        }

        function skip(seconds) {
            if (!video.src && state.clips.length === 0) return;
            video.currentTime += seconds;
        }

        function onTimeUpdate() {
            updateTimeDisplay();
            renderOverlay();
            
            // Check if we need to switch to next clip (for sequential playback)
            const currentClip = state.clips[state.currentClipIndex];
            if (currentClip && video.currentTime >= currentClip.trimEnd) {
                if (state.currentClipIndex < state.clips.length - 1) {
                    state.currentClipIndex++;
                    loadClipIntoPlayer(state.clips[state.currentClipIndex]);
                    if (state.isPlaying) video.play();
                } else {
                    video.pause();
                    state.isPlaying = false;
                    playBtn.textContent = '▶';
                }
            }
        }

        function onVideoEnded() {
            state.isPlaying = false;
            playBtn.textContent = '▶';
        }

        function updateTimeDisplay() {
            const current = formatTime(video.currentTime || 0);
            const duration = formatTime(video.duration || 0);
            timeDisplay.textContent = `${current} / ${duration}`;
        }

        function formatTime(seconds) {
            if (!isFinite(seconds)) return '00:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Overlay Rendering (Canvas)
        function renderOverlay() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Watermark
            if (state.watermark.enabled) {
                ctx.save();
                ctx.globalAlpha = state.watermark.opacity;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(state.watermark.text, canvas.width - 20, canvas.height - 20);
                ctx.restore();
            }
        }

        function renderOverlayLoop() {
            if (state.isPlaying) {
                renderOverlay();
                requestAnimationFrame(renderOverlayLoop);
            }
        }

        // Timeline
        function renderTimeline() {
            timelineContent.innerHTML = '';
            
            state.clips.forEach((clip, index) => {
                const div = document.createElement('div');
                div.className = `clip-block ${clip.type} ${index === state.currentClipIndex ? 'active' : ''}`;
                div.style.width = `${Math.max(80, clip.duration * 20)}px`;
                div.onclick = () => selectClip(index);
                
                if (clip.type === 'video') {
                    // Create thumbnail
                    const img = document.createElement('img');
                    img.className = 'clip-thumb';
                    // Use video frame at 1s as thumbnail
                    const videoUrl = clip.url + '#t=1';
                    img.src = videoUrl;
                    div.appendChild(img);
                } else {
                    div.textContent = clip.type === 'image' ? '🖼️' : '🎵';
                }
                
                const label = document.createElement('span');
                label.className = 'clip-label';
                label.textContent = formatTime(clip.duration);
                div.appendChild(label);
                
                timelineContent.appendChild(div);
            });
        }

        function selectClip(index) {
            state.currentClipIndex = index;
            loadClipIntoPlayer(state.clips[index]);
            renderTimeline();
        }

        // Tools
        function setTool(tool) {
            state.tool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn${tool.charAt(0).toUpperCase() + tool.slice(1)}`).classList.add('active');
        }

        function splitAtPlayhead() {
            if (state.clips.length === 0 || state.currentClipIndex === -1) {
                alert('Select a clip first');
                return;
            }
            
            const clip = state.clips[state.currentClipIndex];
            const splitTime = video.currentTime;
            
            if (splitTime <= clip.trimStart || splitTime >= clip.trimEnd) {
                alert('Move playhead to middle of clip to split');
                return;
            }
            
            // Create second part
            const newClip = {
                ...clip,
                id: Date.now(),
                trimStart: splitTime,
                start: clip.start + (splitTime - clip.trimStart),
                duration: clip.trimEnd - splitTime
            };
            
            // Adjust first part
            clip.trimEnd = splitTime;
            clip.duration = splitTime - clip.trimStart;
            clip.end = clip.start + clip.duration;
            newClip.end = newClip.start + newClip.duration;
            
            // Insert after current
            state.clips.splice(state.currentClipIndex + 1, 0, newClip);
            
            renderTimeline();
            alert('Clip split! Two parts created.');
        }

        function deleteSelected() {
            if (state.currentClipIndex === -1) {
                alert('Select a clip to delete');
                return;
            }
            
            if (confirm('Delete this clip?')) {
                state.clips.splice(state.currentClipIndex, 1);
                if (state.clips.length > 0) {
                    state.currentClipIndex = Math.min(state.currentClipIndex, state.clips.length - 1);
                    loadClipIntoPlayer(state.clips[state.currentClipIndex]);
                } else {
                    state.currentClipIndex = -1;
                    video.src = '';
                    document.getElementById('placeholder').classList.remove('hidden');
                }
                renderTimeline();
            }
        }

        // Watermark
        function showWatermark() {
            document.getElementById('watermarkModal').classList.add('active');
        }

        function toggleWatermark() {
            state.watermark.enabled = document.getElementById('wmEnabled').checked;
            renderOverlay();
        }

        function updateWatermark() {
            state.watermark.text = document.getElementById('wmText').value;
            state.watermark.opacity = parseFloat(document.getElementById('wmOpacity').value);
            renderOverlay();
        }

        // Export
        function showExport() {
            if (state.clips.length === 0) {
                alert('Import a video first');
                return;
            }
            document.getElementById('exportModal').classList.add('active');
        }

        async function startExport() {
            const quality = document.getElementById('exportQuality').value;
            const btn = document.getElementById('exportActionBtn');
            btn.disabled = true;
            
            document.getElementById('exportModal').classList.remove('active');
            document.getElementById('progressOverlay').classList.add('active');
            
            try {
                // Setup canvas for recording
                const stream = canvas.captureStream(30);
                
                // Add video audio if present
                if (video.src && video.captureStream) {
                    const videoStream = video.captureStream();
                    const audioTrack = videoStream.getAudioTracks()[0];
                    if (audioTrack) stream.addTrack(audioTrack);
                }
                
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                const chunks = [];
                
                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `edited_${Date.now()}.webm`;
                    a.click();
                    
                    document.getElementById('progressOverlay').classList.remove('active');
                    btn.disabled = false;
                    alert('Export complete! Video downloaded.');
                };
                
                // Start recording
                recorder.start();
                
                // Play through all clips
                let totalDuration = state.clips.reduce((sum, c) => sum + (c.trimEnd - c.trimStart), 0);
                let processed = 0;
                
                for (let i = 0; i < state.clips.length; i++) {
                    const clip = state.clips[i];
                    loadClipIntoPlayer(clip);
                    
                    await new Promise(resolve => {
                        video.onloadeddata = () => {
                            video.currentTime = clip.trimStart;
                            video.play();
                            
                            const checkProgress = setInterval(() => {
                                const progress = ((video.currentTime - clip.trimStart) / (clip.trimEnd - clip.trimStart)) * 100;
                                updateProgress(((processed + (progress/100) * (clip.trimEnd - clip.trimStart)) / totalDuration) * 100);
                                
                                if (video.currentTime >= clip.trimEnd || video.paused) {
                                    clearInterval(checkProgress);
                                    processed += (clip.trimEnd - clip.trimStart);
                                    resolve();
                                }
                            }, 100);
                        };
                    });
                }
                
                recorder.stop();
                
            } catch (err) {
                console.error('Export error:', err);
                alert('Export failed: ' + err.message);
                document.getElementById('progressOverlay').classList.remove('active');
                btn.disabled = false;
            }
        }

        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressDetail').textContent = `${Math.round(percent)}%`;
        }

        function cancelExport() {
            location.reload(); // Quick reset
        }

        function showSpeed() {
            const speed = prompt('Playback speed (0.5, 1, 1.5, 2):', '1');
            if (speed) video.playbackRate = parseFloat(speed);
        }

        function importSample() {
            // Create a test pattern video using canvas
            const c = document.createElement('canvas');
            c.width = 640;
            c.height = 480;
            const x = c.getContext('2d');
            
            const stream = c.captureStream(30);
            const recorder = new MediaRecorder(stream);
            const chunks = [];
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const file = new File([blob], 'sample.webm', { type: 'video/webm' });
                loadFile(file);
            };
            
            recorder.start();
            
            // Draw 3 seconds of test pattern
            let frames = 0;
            const interval = setInterval(() => {
                frames++;
                x.fillStyle = `hsl(${(frames * 2) % 360}, 50%, 50%)`;
                x.fillRect(0, 0, 640, 480);
                x.fillStyle = 'white';
                x.font = '30px Arial';
                x.fillText(`Frame ${frames}`, 50, 50);
                
                if (frames > 90) { // 3 seconds at 30fps
                    clearInterval(interval);
                    recorder.stop();
                }
            }, 33);
            
            hideModal('importModal');
        }

        // Init
        init();
    </script>
</body>
</html>
