<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>ProVideo Mobile Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface-2: #2c2c2e;
            --accent: #0A84FF;
            --accent-2: #30D158;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --danger: #FF453A;
            --warning: #FF9F0A;
        }

        @supports (padding-top: env(safe-area-inset-top)) {
            :root {
                --safe-top: env(safe-area-inset-top);
                --safe-bottom: env(safe-area-inset-bottom);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            width: 100%;
        }

        /* Mobile Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: var(--safe-top, 0);
            padding-bottom: var(--safe-bottom, 0);
        }

        /* Status Bar Area */
        .status-bar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .status-time {
            font-weight: 600;
            font-size: 15px;
        }

        .status-icons {
            display: flex;
            gap: 5px;
            font-size: 12px;
        }

        /* Preview Area (Center Stage) */
        .preview-stage {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #previewCanvas {
            max-width: 100%;
            max-height: 100%;
            touch-action: none;
        }

        /* Gesture Overlay */
        .gesture-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            touch-action: pan-x pan-y;
        }

        .gesture-hint {
            position: absolute;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .gesture-hint.show { opacity: 1; }

        /* Floating Action Button */
        .fab {
            position: absolute;
            bottom: 280px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(10, 132, 255, 0.4);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        .fab:active { transform: scale(0.95); background: #0051D5; }

        /* Timeline Section */
        .timeline-container {
            background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.1);
            height: 220px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .timeline-toolbar {
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .timeline-toolbar::-webkit-scrollbar { display: none; }

        .tool-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 13px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0.6;
            transition: opacity 0.2s;
            min-width: 48px;
        }

        .tool-btn.active { opacity: 1; color: var(--accent); }
        .tool-btn:active { opacity: 0.8; }

        .tool-icon { font-size: 20px; }

        /* Horizontal Timeline */
        .timeline-scroll {
            flex: 1;
            overflow-x: scroll;
            overflow-y: hidden;
            position: relative;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .timeline-content {
            height: 100%;
            position: relative;
            min-width: 100%;
            padding: 0 50vw; /* Center the playhead */
        }

        .track-lane {
            height: 60px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative;
            display: flex;
            align-items: center;
        }

        .track-label {
            position: absolute;
            left: -50vw;
            width: 40px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            background: var(--surface);
            z-index: 5;
        }

        .clips-container {
            height: 50px;
            position: relative;
            flex: 1;
            margin-left: 10px;
        }

        .clip-thumb {
            position: absolute;
            height: 44px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--surface-2);
            border: 2px solid transparent;
            top: 3px;
            touch-action: pan-x;
            transition: transform 0.2s, border-color 0.2s;
        }

        .clip-thumb.active { border-color: var(--accent); transform: scale(1.02); }
        .clip-thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .clip-duration {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 9px;
            background: rgba(0,0,0,0.8);
            padding: 1px 4px;
            border-radius: 4px;
            font-variant-numeric: tabular-nums;
        }

        /* Playhead */
        .playhead {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            z-index: 20;
            pointer-events: none;
            transform: translateX(-50%);
        }

        .playhead::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid white;
        }

        /* Time Ruler */
        .time-ruler {
            height: 20px;
            position: relative;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .ruler-mark {
            position: absolute;
            bottom: 0;
            width: 1px;
            height: 6px;
            background: rgba(255,255,255,0.3);
        }

        .ruler-mark.major { height: 10px; background: rgba(255,255,255,0.6); }

        /* Bottom Navigation */
        .bottom-nav {
            height: 84px;
            background: rgba(28,28,30,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 8px;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            flex: 1;
            padding: 4px;
            transition: color 0.2s;
        }

        .nav-item.active { color: var(--accent); }
        .nav-item:active { opacity: 0.6; }

        .nav-icon { font-size: 24px; }

        /* Modals (Bottom Sheet Style) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal.active {
            pointer-events: all;
            opacity: 1;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
        }

        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            max-height: 80vh;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .modal.active .bottom-sheet { transform: translateY(0); }

        .sheet-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sheet-title { font-size: 17px; font-weight: 600; }

        .sheet-close {
            background: var(--surface-2);
            border: none;
            color: var(--text);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sheet-content {
            overflow-y: auto;
            padding: 20px;
            flex: 1;
        }

        /* Form Elements Mobile Optimized */
        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .touch-slider {
            width: 100%;
            height: 44px;
            -webkit-appearance: none;
            background: var(--surface-2);
            border-radius: 8px;
            overflow: hidden;
        }

        .touch-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 44px;
            background: var(--accent);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(10,132,255,0.5);
        }

        .touch-btn {
            width: 100%;
            padding: 16px;
            background: var(--surface-2);
            border: none;
            color: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s, background 0.2s;
        }

        .touch-btn:active { transform: scale(0.98); background: #3a3a3c; }
        .touch-btn.primary { background: var(--accent); }
        .touch-btn.danger { background: var(--danger); }

        .segmented-control {
            display: flex;
            background: var(--surface-2);
            border-radius: 8px;
            padding: 2px;
            margin-bottom: 20px;
        }

        .segment {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            border: none;
            background: transparent;
        }

        .segment.active {
            background: var(--accent);
            color: white;
        }

        /* Media Grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            max-height: 400px;
            overflow-y: auto;
        }

        .media-cell {
            aspect-ratio: 1;
            background: var(--surface-2);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .media-cell img { width: 100%; height: 100%; object-fit: cover; }
        
        .media-cell .duration {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .media-cell.selected { ring: 2px solid var(--accent); }

        /* Export Progress */
        .export-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .export-overlay.active { display: flex; }

        .progress-ring {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
        }

        .progress-ring circle {
            fill: none;
            stroke: var(--surface-2);
            stroke-width: 8;
        }

        .progress-ring .progress {
            stroke: var(--accent);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .export-status {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .export-detail {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(50,50,50,0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Range trim handles */
        .trim-controls {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            pointer-events: none;
        }

        .trim-handle {
            position: absolute;
            width: 30px;
            height: 100%;
            background: var(--accent);
            top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: pan-x;
        }

        .trim-handle.left { left: 0; border-radius: 8px 0 0 8px; }
        .trim-handle.right { right: 0; border-radius: 0 8px 8px 0; }
        
        .trim-handle::after {
            content: '||';
            color: white;
            font-weight: bold;
            letter-spacing: -2px;
        }

        /* Orientation Lock Hint */
        .orientation-lock {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .orientation-lock { display: flex; }
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <!-- Orientation Lock -->
    <div class="orientation-lock">
        <div style="font-size: 48px; margin-bottom: 20px;">📱</div>
        <h2>Please Rotate Your Device</h2>
        <p style="color: var(--text-secondary); margin-top: 10px;">This editor works best in portrait mode</p>
    </div>

    <div class="app-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-time" id="clock">9:41</div>
            <div style="font-weight: 700; font-size: 15px;">ProVideo</div>
            <div class="status-icons">📶 🔋</div>
        </div>

        <!-- Preview Stage -->
        <div class="preview-stage" id="previewStage">
            <canvas id="previewCanvas" width="1080" height="1920"></canvas>
            
            <!-- Gesture Layer -->
            <div class="gesture-layer" id="gestureLayer"></div>
            
            <!-- Gesture Hint -->
            <div class="gesture-hint" id="gestureHint">Swipe to seek</div>

            <!-- Play/Pause Overlay Button -->
            <button class="fab" id="playFab" onclick="togglePlayback()">▶</button>
        </div>

        <!-- Timeline Container -->
        <div class="timeline-container">
            <!-- Tools -->
            <div class="timeline-toolbar">
                <button class="tool-btn active" onclick="setTool('select')">
                    <span class="tool-icon">👆</span>
                    <span>Select</span>
                </button>
                <button class="tool-btn" onclick="setTool('split')">
                    <span class="tool-icon">✂️</span>
                    <span>Split</span>
                </button>
                <button class="tool-btn" onclick="setTool('trim')">
                    <span class="tool-icon">⏱</span>
                    <span>Trim</span>
                </button>
                <button class="tool-btn" onclick="setTool('text')">
                    <span class="tool-icon">T</span>
                    <span>Text</span>
                </button>
                <button class="tool-btn" onclick="setTool('filter')">
                    <span class="tool-icon">🎨</span>
                    <span>Filter</span>
                </button>
                <button class="tool-btn" onclick="openModal('audio')">
                    <span class="tool-icon">🎵</span>
                    <span>Audio</span>
                </button>
            </div>

            <!-- Timeline -->
            <div class="time-ruler" id="ruler"></div>
            
            <div class="timeline-scroll" id="timelineScroll">
                <div class="timeline-content" id="timelineContent">
                    <div class="playhead"></div>
                    
                    <!-- Video Track -->
                    <div class="track-lane">
                        <div class="track-label">Video</div>
                        <div class="clips-container" id="videoTrack"></div>
                    </div>
                    
                    <!-- Audio Track -->
                    <div class="track-lane">
                        <div class="track-label">Audio</div>
                        <div class="clips-container" id="audioTrack"></div>
                    </div>
                    
                    <!-- Overlay Track -->
                    <div class="track-lane">
                        <div class="track-label">Overlay</div>
                        <div class="clips-container" id="overlayTrack"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('edit')">
                <span class="nav-icon">✂️</span>
                <span>Edit</span>
            </button>
            <button class="nav-item" onclick="openModal('media')">
                <span class="nav-icon">📁</span>
                <span>Media</span>
            </button>
            <button class="nav-item" onclick="openModal('adjust')">
                <span class="nav-icon">⚡</span>
                <span>Adjust</span>
            </button>
            <button class="nav-item" onclick="openModal('export')">
                <span class="nav-icon">🚀</span>
                <span>Export</span>
            </button>
        </div>
    </div>

    <!-- Media Modal -->
    <div class="modal" id="mediaModal">
        <div class="modal-backdrop" onclick="closeModals()"></div>
        <div class="bottom-sheet">
            <div class="sheet-header">
                <span class="sheet-title">Media Library</span>
                <button class="sheet-close" onclick="closeModals()">×</button>
            </div>
            <div class="sheet-content">
                <button class="touch-btn primary" onclick="document.getElementById('fileInput').click()">
                    📁 Import from Device
                </button>
                <button class="touch-btn" onclick="importFromCamera()">
                    📷 Record Video
                </button>
                <input type="file" id="fileInput" multiple accept="video/*,audio/*,image/*" style="display: none" onchange="handleFiles(this.files)">
                
                <div class="input-label" style="margin-top: 20px;">Recent Imports</div>
                <div class="media-grid" id="mediaGrid"></div>
            </div>
        </div>
    </div>

    <!-- Adjust Modal -->
    <div class="modal" id="adjustModal">
        <div class="modal-backdrop" onclick="closeModals()"></div>
        <div class="bottom-sheet">
            <div class="sheet-header">
                <span class="sheet-title">Adjustments</span>
                <button class="sheet-close" onclick="closeModals()">×</button>
            </div>
            <div class="sheet-content">
                <div class="input-group">
                    <label class="input-label">Watermark</label>
                    <div class="segmented-control">
                        <button class="segment" onclick="toggleWatermark(false)">Off</button>
                        <button class="segment active" onclick="toggleWatermark(true)">On</button>
                    </div>
                    <input type="text" class="touch-btn" style="text-align: left; font-weight: normal;" 
                           id="watermarkText" value="© My Brand" onchange="updateSettings()">
                </div>

                <div class="input-group">
                    <label class="input-label">Countdown Timer</label>
                    <div class="segmented-control">
                        <button class="segment active" onclick="toggleCountdown(false)">Off</button>
                        <button class="segment" onclick="toggleCountdown(true)">On</button>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Volume</label>
                    <input type="range" class="touch-slider" min="0" max="200" value="100" 
                           id="volumeSlider" oninput="updateVolume(this.value)">
                </div>

                <div class="input-group">
                    <label class="input-label">Speed</label>
                    <div class="segmented-control">
                        <button class="segment" onclick="setSpeed(0.5)">0.5x</button>
                        <button class="segment active" onclick="setSpeed(1)">1x</button>
                        <button class="segment" onclick="setSpeed(1.5)">1.5x</button>
                        <button class="segment" onclick="setSpeed(2)">2x</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div class="modal" id="exportModal">
        <div class="modal-backdrop" onclick="closeModals()"></div>
        <div class="bottom-sheet">
            <div class="sheet-header">
                <span class="sheet-title">Export Video</span>
                <button class="sheet-close" onclick="closeModals()">×</button>
            </div>
            <div class="sheet-content">
                <div class="input-group">
                    <label class="input-label">Resolution</label>
                    <div class="segmented-control">
                        <button class="segment" onclick="setResolution(720)">720p</button>
                        <button class="segment active" onclick="setResolution(1080)">1080p</button>
                        <button class="segment" onclick="setResolution(2160)">4K</button>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Format</label>
                    <div class="segmented-control">
                        <button class="segment active">MP4</button>
                        <button class="segment">GIF</button>
                    </div>
                </div>

                <button class="touch-btn primary" onclick="startExport()" style="margin-top: 30px;">
                    🚀 Export HD Video
                </button>
            </div>
        </div>
    </div>

    <!-- Audio Modal -->
    <div class="modal" id="audioModal">
        <div class="modal-backdrop" onclick="closeModals()"></div>
        <div class="bottom-sheet">
            <div class="sheet-header">
                <span class="sheet-title">Audio Tracks</span>
                <button class="sheet-close" onclick="closeModals()">×</button>
            </div>
            <div class="sheet-content">
                <button class="touch-btn" onclick="addVoiceOver()">
                    🎙️ Record Voiceover
                </button>
                <button class="touch-btn" onclick="addMusic()">
                    🎵 Add Music
                </button>
                <div id="audioTracksList"></div>
            </div>
        </div>
    </div>

    <!-- Export Progress Overlay -->
    <div class="export-overlay" id="exportOverlay">
        <svg class="progress-ring" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="54"></circle>
            <circle class="progress" cx="60" cy="60" r="54" 
                    stroke-dasharray="339.292" 
                    stroke-dashoffset="339.292"
                    id="progressCircle"></circle>
        </svg>
        <div class="export-status" id="exportStatus">Exporting...</div>
        <div class="export-detail" id="exportDetail">Processing video 1 of 3</div>
        <button class="touch-btn" onclick="cancelExport()" style="margin-top: 40px; width: auto; padding: 12px 30px;">
            Cancel
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Mobile-First State
        const state = {
            clips: [],
            currentTime: 0,
            duration: 0,
            isPlaying: false,
            selectedClip: null,
            tool: 'select',
            scale: 50, // pixels per second
            settings: {
                watermark: { enabled: true, text: '© My Brand', opacity: 0.7 },
                countdown: { enabled: false, duration: 3 },
                volume: 100,
                speed: 1,
                resolution: 1080
            },
            export: { active: false, progress: 0 }
        };

        // Canvas Setup (Portrait 9:16 optimized)
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrame;

        // Touch Handling
        let touchStartX = 0;
        let touchStartTime = 0;
        let isScrubbing = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            setupGestures();
            renderTimeline();
            showToast('Tap + to add media');
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: false });
        }

        // Gesture System
        function setupGestures() {
            const layer = document.getElementById('gestureLayer');
            
            layer.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartTime = state.currentTime;
                isScrubbing = true;
                showGestureHint('👆 Swipe left/right to seek');
            }, { passive: true });

            layer.addEventListener('touchmove', (e) => {
                if (!isScrubbing) return;
                const delta = (e.touches[0].clientX - touchStartX) / state.scale;
                state.currentTime = Math.max(0, Math.min(state.duration, touchStartTime - delta));
                updatePlayhead();
                renderFrame();
            }, { passive: true });

            layer.addEventListener('touchend', () => {
                isScrubbing = false;
                hideGestureHint();
            });

            // Double tap to play/pause
            let lastTap = 0;
            layer.addEventListener('touchend', (e) => {
                const currentTime = new Date().getTime();
                if (currentTime - lastTap < 300) {
                    togglePlayback();
                }
                lastTap = currentTime;
            });
        }

        function showGestureHint(text) {
            const hint = document.getElementById('gestureHint');
            hint.textContent = text;
            hint.classList.add('show');
        }

        function hideGestureHint() {
            document.getElementById('gestureHint').classList.remove('show');
        }

        // Media Import
        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const url = URL.createObjectURL(file);
                const type = file.type.startsWith('video/') ? 'video' : 
                           file.type.startsWith('audio/') ? 'audio' : 'image';
                
                const clip = {
                    id: Date.now() + Math.random(),
                    type: type,
                    url: url,
                    name: file.name,
                    duration: type === 'image' ? 5 : 0,
                    start: state.duration,
                    end: state.duration + (type === 'image' ? 5 : 0),
                    trimStart: 0,
                    trimEnd: type === 'image' ? 5 : 0
                };

                if (type === 'video') {
                    const video = document.createElement('video');
                    video.src = url;
                    video.onloadedmetadata = () => {
                        clip.duration = video.duration;
                        clip.end = state.duration + video.duration;
                        clip.trimEnd = video.duration;
                        state.clips.push(clip);
                        updateDuration();
                        renderTimeline();
                        renderFrame();
                    };
                } else {
                    state.clips.push(clip);
                    updateDuration();
                    renderTimeline();
                }
            });
            
            closeModals();
            showToast(`Added ${files.length} items`);
        }

        function importFromCamera() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/*';
            input.capture = 'environment';
            input.onchange = (e) => handleFiles(e.target.files);
            input.click();
        }

        // Timeline Rendering
        function renderTimeline() {
            const videoTrack = document.getElementById('videoTrack');
            const audioTrack = document.getElementById('audioTrack');
            const overlayTrack = document.getElementById('overlayTrack');
            
            videoTrack.innerHTML = '';
            audioTrack.innerHTML = '';
            overlayTrack.innerHTML = '';

            state.clips.forEach(clip => {
                const div = document.createElement('div');
                div.className = `clip-thumb ${state.selectedClip === clip.id ? 'active' : ''}`;
                div.style.left = `${clip.start * state.scale}px`;
                div.style.width = `${(clip.end - clip.start) * state.scale}px`;
                
                if (clip.type === 'video' || clip.type === 'image') {
                    const img = document.createElement('img');
                    img.src = clip.type === 'image' ? clip.url : `${clip.url}#t=0.5`;
                    div.appendChild(img);
                } else {
                    div.style.background = 'linear-gradient(45deg, #FF6B6B, #4ECDC4)';
                }

                const duration = document.createElement('span');
                duration.className = 'clip-duration';
                duration.textContent = formatTime(clip.end - clip.start);
                div.appendChild(duration);

                div.onclick = (e) => {
                    e.stopPropagation();
                    selectClip(clip.id);
                };

                // Long press to move
                let pressTimer;
                div.addEventListener('touchstart', (e) => {
                    pressTimer = setTimeout(() => {
                        showToast('Drag to reposition (coming soon)');
                    }, 800);
                });
                div.addEventListener('touchend', () => clearTimeout(pressTimer));

                if (clip.type === 'audio') {
                    audioTrack.appendChild(div);
                } else if (clip.type === 'text' || clip.type === 'overlay') {
                    overlayTrack.appendChild(div);
                } else {
                    videoTrack.appendChild(div);
                }
            });

            renderRuler();
        }

        function renderRuler() {
            const ruler = document.getElementById('ruler');
            ruler.innerHTML = '';
            
            for (let i = 0; i <= state.duration; i += 1) {
                const mark = document.createElement('div');
                mark.className = i % 5 === 0 ? 'ruler-mark major' : 'ruler-mark';
                mark.style.left = `${50 + (i * state.scale)}%`;
                ruler.appendChild(mark);
            }
        }

        function updateDuration() {
            state.duration = state.clips.reduce((max, clip) => Math.max(max, clip.end), 0);
            document.getElementById('timelineContent').style.width = 
                `${Math.max(100, (state.duration * state.scale) + window.innerWidth)}px`;
        }

        function updatePlayhead() {
            const scroll = document.getElementById('timelineScroll');
            const centerOffset = window.innerWidth / 2;
            const position = (state.currentTime * state.scale);
            scroll.scrollLeft = position - centerOffset + 40;
        }

        // Selection & Tools
        function selectClip(id) {
            state.selectedClip = id;
            renderTimeline();
            
            if (state.tool === 'split') {
                splitClip(id);
            } else if (state.tool === 'trim') {
                openTrimMode(id);
            }
        }

        function setTool(tool) {
            state.tool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (tool === 'text') {
                addTextOverlay();
            } else if (tool === 'filter') {
                showToast('Select a clip to apply filter');
            }
        }

        function splitClip(id) {
            const clip = state.clips.find(c => c.id === id);
            if (!clip || state.currentTime <= clip.start || state.currentTime >= clip.end) {
                showToast('Move playhead over clip to split');
                return;
            }

            const splitPoint = state.currentTime - clip.start;
            const newClip = {
                ...clip,
                id: Date.now(),
                start: state.currentTime,
                trimStart: clip.trimStart + splitPoint
            };

            clip.end = state.currentTime;
            clip.trimEnd = clip.trimStart + splitPoint;

            state.clips.push(newClip);
            state.clips.sort((a, b) => a.start - b.start);
            
            updateDuration();
            renderTimeline();
            showToast('Clip split');
        }

        function openTrimMode(id) {
            showToast('Drag clip edges to trim (feature in progress)');
        }

        // Playback
        function togglePlayback() {
            state.isPlaying = !state.isPlaying;
            document.getElementById('playFab').textContent = state.isPlaying ? '⏸' : '▶';
            
            if (state.isPlaying) {
                playLoop();
            } else {
                cancelAnimationFrame(animationFrame);
            }
        }

        function playLoop() {
            if (!state.isPlaying) return;
            
            state.currentTime += 0.033 * state.settings.speed;
            
            if (state.currentTime >= state.duration) {
                state.currentTime = 0;
                state.isPlaying = false;
                document.getElementById('playFab').textContent = '▶';
            }
            
            updatePlayhead();
            renderFrame();
            
            if (state.isPlaying) {
                animationFrame = requestAnimationFrame(playLoop);
            }
        }

        function renderFrame() {
            // Clear with black
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Find active video clips
            const activeClips = state.clips.filter(c => 
                c.type !== 'audio' && 
                state.currentTime >= c.start && 
                state.currentTime <= c.end
            );

            // Render video clips (bottom to top)
            activeClips.forEach(clip => {
                if (clip.type === 'image') {
                    const img = new Image();
                    img.src = clip.url;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                }
            });

            // If no video, show black with timecode
            if (activeClips.length === 0) {
                ctx.fillStyle = '#333';
                ctx.font = 'bold 40px -apple-system';
                ctx.textAlign = 'center';
                ctx.fillText(formatTime(state.currentTime), canvas.width/2, canvas.height/2);
            }

            // Watermark
            if (state.settings.watermark.enabled) {
                ctx.save();
                ctx.globalAlpha = state.settings.watermark.opacity;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px -apple-system';
                ctx.textAlign = 'right';
                ctx.fillText(state.settings.watermark.text, canvas.width - 40, canvas.height - 40);
                ctx.restore();
            }

            // Countdown
            if (state.settings.countdown.enabled && state.currentTime < state.settings.countdown.duration) {
                const remaining = Math.ceil(state.settings.countdown.duration - state.currentTime);
                
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, 150, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 120px -apple-system';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(remaining, canvas.width/2, canvas.height/2);
                
                // Progress ring
                ctx.strokeStyle = '#0A84FF';
                ctx.lineWidth = 8;
                ctx.beginPath();
                const progress = state.currentTime / state.settings.countdown.duration;
                ctx.arc(canvas.width/2, canvas.height/2, 140, -Math.PI/2, 
                    (-Math.PI/2) + (Math.PI * 2 * progress));
                ctx.stroke();
                ctx.restore();
            }
        }

        // Text & Overlays
        function addTextOverlay() {
            const text = prompt('Enter text:', 'My Text');
            if (!text) return;

            state.clips.push({
                id: Date.now(),
                type: 'text',
                text: text,
                start: state.currentTime,
                end: state.currentTime + 3,
                duration: 3
            });

            updateDuration();
            renderTimeline();
            showToast('Text added');
        }

        // Modals
        function openModal(type) {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById(`${type}Modal`).classList.add('active');
            
            if (type === 'media') renderMediaGrid();
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function renderMediaGrid() {
            const grid = document.getElementById('mediaGrid');
            grid.innerHTML = state.clips.map(clip => `
                <div class="media-cell" onclick="jumpToClip('${clip.id}')">
                    ${clip.type === 'image' ? `<img src="${clip.url}">` : 
                      clip.type === 'video' ? `<img src="${clip.url}#t=0.5">` : 
                      '<div style="padding: 20px;">🎵</div>'}
                    <div class="duration">${formatTime(clip.end - clip.start)}</div>
                </div>
            `).join('');
        }

        function jumpToClip(id) {
            const clip = state.clips.find(c => c.id === id);
            if (clip) {
                state.currentTime = clip.start;
                updatePlayhead();
                renderFrame();
                closeModals();
            }
        }

        // Settings
        function toggleWatermark(enabled) {
            state.settings.watermark.enabled = enabled;
            renderFrame();
            updateUI();
        }

        function toggleCountdown(enabled) {
            state.settings.countdown.enabled = enabled;
            state.settings.countdown.startTime = state.currentTime;
            renderFrame();
            updateUI();
        }

        function updateSettings() {
            state.settings.watermark.text = document.getElementById('watermarkText').value;
            renderFrame();
        }

        function updateVolume(val) {
            state.settings.volume = val;
        }

        function setSpeed(speed) {
            state.settings.speed = speed;
            updateUI();
        }

        function setResolution(res) {
            state.settings.resolution = res;
            updateUI();
        }

        function updateUI() {
            // Update segmented controls based on state
            document.querySelectorAll('.segment').forEach(seg => {
                seg.classList.remove('active');
                // Simple check based on text content
                if ((state.settings.watermark.enabled && seg.textContent === 'On') ||
                    (!state.settings.watermark.enabled && seg.textContent === 'Off')) {
                    if (seg.parentElement.previousElementSibling?.textContent === 'Watermark') {
                        seg.classList.add('active');
                    }
                }
            });
        }

        // Export System optimized for Mobile
        async function startExport() {
            closeModals();
            document.getElementById('exportOverlay').classList.add('active');
            
            const duration = state.duration;
            const fps = 30;
            const totalFrames = duration * fps;
            let currentFrame = 0;

            // Configure canvas for export resolution
            const targetHeight = state.settings.resolution;
            const targetWidth = (targetHeight * 9) / 16; // 9:16 aspect
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            const stream = canvas.captureStream(fps);
            const mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: state.settings.resolution === 2160 ? 20000000 : 8000000
            });

            const chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                // Mobile-friendly download
                const a = document.createElement('a');
                a.href = url;
                a.download = `ProVideo_${Date.now()}.webm`;
                a.click();
                
                document.getElementById('exportOverlay').classList.remove('active');
                showToast('Video saved to downloads');
                
                // Reset canvas
                canvas.width = 1080;
                canvas.height = 1920;
                renderFrame();
            };

            mediaRecorder.start();
            
            // Render loop
            const exportInterval = setInterval(() => {
                if (currentFrame >= totalFrames) {
                    clearInterval(exportInterval);
                    mediaRecorder.stop();
                    return;
                }

                state.currentTime = currentFrame / fps;
                renderFrame();
                
                currentFrame++;
                const progress = (currentFrame / totalFrames) * 100;
                const circle = document.getElementById('progressCircle');
                const offset = 339.292 - (339.292 * progress / 100);
                circle.style.strokeDashoffset = offset;
                
                document.getElementById('exportDetail').textContent = 
                    `Frame ${currentFrame} of ${totalFrames}`;
            }, 1000 / fps);
        }

        function cancelExport() {
            location.reload(); // Quick reset
        }

        // Audio Features
        function addVoiceOver() {
            if (!navigator.mediaDevices) {
                showToast('Microphone not available');
                return;
            }
            
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    const mediaRecorder = new MediaRecorder(stream);
                    const chunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        
                        state.clips.push({
                            id: Date.now(),
                            type: 'audio',
                            url: url,
                            start: state.currentTime,
                            end: state.currentTime + 10,
                            duration: 10
                        });
                        
                        updateDuration();
                        renderTimeline();
                        showToast('Voiceover added');
                    };
                    
                    mediaRecorder.start();
                    showToast('Recording... Tap stop when done');
                    
                    // Auto-stop after 60s or tap to stop
                    setTimeout(() => mediaRecorder.stop(), 60000);
                });
        }

        function addMusic() {
            showToast('Select audio file from device');
            document.getElementById('fileInput').accept = 'audio/*';
            document.getElementById('fileInput').click();
            document.getElementById('fileInput').accept = 'video/*,audio/*,image/*'; // Reset
        }

        // Utilities
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 100);
            return `${m}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // Handle visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && state.isPlaying) {
                togglePlayback();
            }
        });

        // Prevent scroll bounce on iOS
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.timeline-scroll')) return;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
