<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>ProVideo Mobile Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface-2: #2c2c2e;
            --accent: #0A84FF;
            --accent-2: #30D158;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --danger: #FF453A;
            --warning: #FF9F0A;
        }

        @supports (padding-top: env(safe-area-inset-top)) {
            :root {
                --safe-top: env(safe-area-inset-top);
                --safe-bottom: env(safe-area-inset-bottom);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            width: 100%;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: var(--safe-top, 0);
            padding-bottom: var(--safe-bottom, 0);
        }

        .status-bar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .status-time { font-weight: 600; font-size: 15px; }
        .status-icons { display: flex; gap: 5px; font-size: 12px; }

        .preview-stage {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #previewCanvas {
            max-width: 100%;
            max-height: 100%;
            touch-action: none;
            background: #000;
        }

        .gesture-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            touch-action: pan-x pan-y;
        }

        .gesture-hint {
            position: absolute;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        .gesture-hint.show { opacity: 1; }

        .fab {
            position: absolute;
            bottom: 280px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(10, 132, 255, 0.4);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        .fab:active { transform: scale(0.95); background: #0051D5; }

        .timeline-container {
            background: var(--surface);
            border-top: 1px solid rgba(255,255,255,0.1);
            height: 220px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .timeline-toolbar {
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .timeline-toolbar::-webkit-scrollbar { display: none; }

        .tool-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 13px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0.6;
            transition: opacity 0.2s;
            min-width: 48px;
        }

        .tool-btn.active { opacity: 1; color: var(--accent); }
        .tool-btn:active { opacity: 0.8; }

        .tool-icon { font-size: 20px; }

        .timeline-scroll {
            flex: 1;
            overflow-x: scroll;
            overflow-y: hidden;
            position: relative;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .timeline-content {
            height: 100%;
            position: relative;
            min-width: 100%;
            padding: 0 50vw;
        }

        .track-lane {
            height: 60px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative;
            display: flex;
            align-items: center;
        }

        .track-label {
            position: absolute;
            left: -50vw;
            width: 40px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            background: var(--surface);
            z-index: 5;
        }

        .clips-container {
            height: 50px;
            position: relative;
            flex: 1;
            margin-left: 10px;
        }

        .clip-thumb {
            position: absolute;
            height: 44px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--surface-2);
            border: 2px solid transparent;
            top: 3px;
            touch-action: pan-x;
            transition: transform 0.2s, border-color 0.2s;
        }

        .clip-thumb.active { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 2px rgba(10, 132, 255, 0.3);
        }

        .clip-thumb img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            pointer-events: none;
        }

        .clip-thumb.video { background: #000; }
        
        .clip-duration {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 9px;
            background: rgba(0,0,0,0.8);
            padding: 1px 4px;
            border-radius: 4px;
            font-variant-numeric: tabular-nums;
            color: white;
            z-index: 2;
        }

        .clip-thumb::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            opacity: 0.5;
        }

        .clip-thumb.video::before { content: '▶'; color: white; z-index: 1; }
        .clip-thumb.audio::before { content: '🎵'; }

        .playhead {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            z-index: 20;
            pointer-events: none;
            transform: translateX(-50%);
        }

        .playhead::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid white;
        }

        .time-ruler {
            height: 20px;
            position: relative;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .ruler-mark {
            position: absolute;
            bottom: 0;
            width: 1px;
            height: 6px;
            background: rgba(255,255,255,0.3);
        }

        .ruler-mark.major { height: 10px; background: rgba(255,255,255,0.6); }

        .bottom-nav {
            height: 84px;
            background: rgba(28,28,30,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 8px;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            flex: 1;
            padding: 4px;
            transition: color 0.2s;
        }

        .nav-item.active { color: var(--accent); }
        .nav-item:active { opacity: 0.6; }

        .nav-icon { font-size: 24px; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal.active {
            pointer-events: all;
            opacity: 1;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
        }

        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            max-height: 80vh;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .modal.active .bottom-sheet { transform: translateY(0); }

        .sheet-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sheet-title { font-size: 17px; font-weight: 600; }

        .sheet-close {
            background: var(--surface-2);
            border: none;
            color: var(--text);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sheet-content {
            overflow-y: auto;
            padding: 20px;
            flex: 1;
        }

        .input-group { margin-bottom: 20px; }

        .input-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .touch-slider {
            width: 100%;
            height: 44px;
            -webkit-appearance: none;
            background: var(--surface-2);
            border-radius: 8px;
            overflow: hidden;
        }

        .touch-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 44px;
            background: var(--accent);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(10,132,255,0.5);
        }

        .touch-btn {
            width: 100%;
            padding: 16px;
            background: var(--surface-2);
            border: none;
            color: white;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s, background 0.2s;
        }

        .touch-btn:active { transform: scale(0.98); background: #3a3a3c; }
        .touch-btn.primary { background: var(--accent); }

        .segmented-control {
            display: flex;
            background: var(--surface-2);
            border-radius: 8px;
            padding: 2px;
            margin-bottom: 20px;
        }

        .segment {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            border: none;
            background: transparent;
        }

        .segment.active {
            background: var(--accent);
            color: white;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            max-height: 400px;
            overflow-y: auto;
        }

        .media-cell {
            aspect-ratio: 9/16;
            background: var(--surface-2);
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid transparent;
        }

        .media-cell.selected { border-color: var(--accent); }

        .media-cell img { width: 100%; height: 100%; object-fit: cover; }
        
        .media-cell .duration {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .export-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .export-overlay.active { display: flex; }

        .progress-ring {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke: var(--surface-2);
            stroke-width: 8;
        }

        .progress-ring .progress {
            stroke: var(--accent);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s;
            stroke-dasharray: 339.292;
            stroke-dashoffset: 339.292;
        }

        .export-status {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .export-detail {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(50,50,50,0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        .empty-state-text { font-size: 15px; }

        .video-element {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="status-bar">
            <div class="status-time" id="clock">9:41</div>
            <div style="font-weight: 700; font-size: 15px;">ProVideo</div>
            <div class="status-icons">📶 🔋</div>
        </div>

        <div class="preview-stage" id="previewStage">
            <canvas id="previewCanvas" width="1080" height="1920"></canvas>
            
            <div class="gesture-layer" id="gestureLayer"></div>
            <div class="gesture-hint" id="gestureHint">Swipe to seek</div>

            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">🎬</div>
                <div class="empty-state-text">Import media to start editing</div>
            </div>

            <button class="fab" id="playFab" onclick="togglePlayback()">▶</button>
        </div>

        <div class="timeline-container">
            <div class="timeline-toolbar">
                <button class="tool-btn active" onclick="setTool('select')">
                    <span class="tool-icon">👆</span>
                    <span>Select</span>
                </button>
                <button class="tool-btn" onclick="setTool('split')">
                    <span class="tool-icon">✂️</span>
                    <span>Split</span>
                </button>
                <button class="tool-btn" onclick="setTool('trim')">
                    <span class="tool-icon">⏱</span>
                    <span>Trim</span>
                </button>
                <button class="tool-btn" onclick="setTool('text')">
                    <span class="tool-icon">T</span>
                    <span>Text</span>
                </button>
                <button class="tool-btn" onclick="setTool('filter')">
                    <span class="tool-icon">🎨</span>
                    <span>Filter</span>
                </button>
                <button class="tool-btn" onclick="openModal('audio')">
                    <span class="tool-icon">🎵</span>
                    <span>Audio</span>
                </button>
            </div>

            <div class="time-ruler" id="ruler"></div>
            
            <div class="timeline-scroll" id="timelineScroll">
                <div class="timeline-content" id="timelineContent">
                    <div class="playhead"></div>
                    
                    <div class="track-lane">
                        <div class="track-label">Video</div>
                        <div class="clips-container" id="videoTrack"></div>
                    </div>
                    
                    <div class="track-lane">
                        <div class="track-label">Audio</div>
                        <div class="clips-container" id="audioTrack"></div>
                    </div>
                    
                    <div class="track-lane">
                        <div class="track-label">Overlay</div>
                        <div class="clips-container" id="overlayTrack"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('edit')">
                <span class="nav-icon">✂️</span>
                <span>Edit</span>
            </button>
            <button class="nav-item" onclick="openModal('media')">
                <span class="nav-icon">📁</span>
                <span>Media</span>
            </button>
            <button class="nav-item" onclick="openModal('adjust')">
                <span class="nav-icon">⚡</span>
                <span>Adjust</span>
            </button>
            <button class="nav-item" onclick="openModal('export')">
                <span class="nav-icon">🚀</span>
                <span>Export</span>
            </button>
        </div>
    </div>

    <div class="modal" id="mediaModal">
        <div class="modal-backdrop" onclick="closeModals()"></div>
        <div class="bottom-sheet">
            <div class="sheet-header">
                <span class="sheet-title">Media Library</span>
                <button class="sheet-close" onclick="closeModals()">×</button>
            </div>
            <div class="sheet-content">
                <button class="touch-btn primary" onclick="document.getElementById('fileInput').click()">
                    📁 Import from Device
                </button>
                <button class="touch-btn" onclick="importFromCamera()">
                    📷 Record Video
                </button>
                <input type="file" id="fileInput" multiple accept="video/*,audio/*,image/*" style="display: none" onchange="handleFiles(this.files)">
                
                <div class="input-label" style="margin-top: 20px;">Recent Imports</div>
                <div class="media-grid" id="mediaGrid"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="adjustModal">
        <div class="modal-backdrop" onclick="closeModals()"></div>
        <div class="bottom-sheet">
            <div class="sheet-header">
                <span class="sheet-title">Adjustments</span>
                <button class="sheet-close" onclick="closeModals()">×</button>
            </div>
            <div class="sheet-content">
                <div class="input-group">
                    <label class="input-label">Watermark</label>
                    <div class="segmented-control">
                        <button class="segment active" onclick="setWatermark(false)">Off</button>
                        <button class="segment" onclick="setWatermark(true)">On</button>
                    </div>
                    <input type="text" class="touch-btn" style="text-align: left; font-weight: normal; display: none;" 
                           id="watermarkText" value="© My Brand" onchange="updateSettings()">
                </div>

                <div class="input-group">
                    <label class="input-label">Countdown Timer</label>
                    <div class="segmented-control">
                        <button class="segment active" onclick="setCountdown(false)">Off</button>
                        <button class="segment" onclick="setCountdown(true)">On</button>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Volume</label>
                    <input type="range" class="touch-slider" min="0" max="200" value="100" 
                           id="volumeSlider" oninput="updateVolume(this.value)">
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="exportModal">
        <div class="modal-backdrop" onclick="closeModals()"></div>
        <div class="bottom-sheet">
            <div class="sheet-header">
                <span class="sheet-title">Export Video</span>
                <button class="sheet-close" onclick="closeModals()">×</button>
            </div>
            <div class="sheet-content">
                <div class="input-group">
                    <label class="input-label">Resolution</label>
                    <div class="segmented-control">
                        <button class="segment" onclick="setResolution(720)">720p</button>
                        <button class="segment active" onclick="setResolution(1080)">1080p</button>
                        <button class="segment" onclick="setResolution(2160)">4K</button>
                    </div>
                </div>

                <button class="touch-btn primary" onclick="startExport()" style="margin-top: 30px;">
                    🚀 Export HD Video
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="audioModal">
        <div class="modal-backdrop" onclick="closeModals()"></div>
        <div class="bottom-sheet">
            <div class="sheet-header">
                <span class="sheet-title">Audio Tracks</span>
                <button class="sheet-close" onclick="closeModals()">×</button>
            </div>
            <div class="sheet-content">
                <button class="touch-btn" onclick="addVoiceOver()">
                    🎙️ Record Voiceover
                </button>
                <button class="touch-btn" onclick="addMusic()">
                    🎵 Add Music
                </button>
            </div>
        </div>
    </div>

    <div class="export-overlay" id="exportOverlay">
        <svg class="progress-ring" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="54"></circle>
            <circle class="progress" cx="60" cy="60" r="54" id="progressCircle"></circle>
        </svg>
        <div class="export-status" id="exportStatus">Exporting...</div>
        <div class="export-detail" id="exportDetail">Processing...</div>
        <button class="touch-btn" onclick="cancelExport()" style="margin-top: 40px; width: auto; padding: 12px 30px;">
            Cancel
        </button>
    </div>

    <div id="videoContainer" style="display: none;"></div>
    <div class="toast" id="toast"></div>

    <script>
        const state = {
            clips: [],
            currentTime: 0,
            duration: 0,
            isPlaying: false,
            selectedClip: null,
            tool: 'select',
            scale: 50,
            settings: {
                watermark: { enabled: false, text: '© My Brand', opacity: 0.7 },
                countdown: { enabled: false, duration: 3 },
                volume: 100,
                resolution: 1080
            }
        };

        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrame;
        const videoElements = new Map(); // Store video elements

        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            setupGestures();
            renderFrame();
            checkEmptyState();
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: false });
        }

        function checkEmptyState() {
            const emptyState = document.getElementById('emptyState');
            if (state.clips.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
            }
        }

        function setupGestures() {
            const layer = document.getElementById('gestureLayer');
            let touchStartX = 0;
            let touchStartTime = 0;
            let isScrubbing = false;

            layer.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartTime = state.currentTime;
                isScrubbing = true;
                showGestureHint('👆 Swipe to seek');
            }, { passive: true });

            layer.addEventListener('touchmove', (e) => {
                if (!isScrubbing) return;
                const deltaPixels = e.touches[0].clientX - touchStartX;
                const deltaTime = deltaPixels / state.scale;
                state.currentTime = Math.max(0, Math.min(state.duration, touchStartTime - deltaTime));
                updatePlayhead();
                renderFrame();
            }, { passive: true });

            layer.addEventListener('touchend', () => {
                isScrubbing = false;
                hideGestureHint();
            });

            let lastTap = 0;
            layer.addEventListener('touchend', (e) => {
                const currentTime = new Date().getTime();
                if (currentTime - lastTap < 300) {
                    togglePlayback();
                }
                lastTap = currentTime;
            });
        }

        function showGestureHint(text) {
            const hint = document.getElementById('gestureHint');
            hint.textContent = text;
            hint.classList.add('show');
            setTimeout(hideGestureHint, 1500);
        }

        function hideGestureHint() {
            document.getElementById('gestureHint').classList.remove('show');
        }

        async function handleFiles(files) {
            for (let file of Array.from(files)) {
                await loadMedia(file);
            }
            closeModals();
            showToast(`Added ${files.length} item(s)`);
            checkEmptyState();
        }

        async function loadMedia(file) {
            const url = URL.createObjectURL(file);
            const type = file.type.startsWith('video/') ? 'video' : 
                        file.type.startsWith('audio/') ? 'audio' : 'image';
            
            const clip = {
                id: Date.now() + Math.random().toString(36).substr(2, 9),
                type: type,
                url: url,
                file: file,
                name: file.name,
                duration: type === 'image' ? 5 : 0,
                start: state.duration,
                end: state.duration + (type === 'image' ? 5 : 0),
                trimStart: 0,
                trimEnd: type === 'image' ? 5 : 0,
                volume: 1
            };

            if (type === 'video') {
                // Create persistent video element for this clip
                const video = document.createElement('video');
                video.src = url;
                video.crossOrigin = 'anonymous';
                video.preload = 'auto';
                video.playsInline = true;
                video.muted = true;
                video.style.display = 'none';
                document.getElementById('videoContainer').appendChild(video);
                
                videoElements.set(clip.id, video);
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        clip.duration = video.duration;
                        clip.end = state.duration + video.duration;
                        clip.trimEnd = video.duration;
                        resolve();
                    };
                    video.onerror = () => {
                        showToast('Error loading video', 'error');
                        resolve();
                    };
                    setTimeout(resolve, 5000); // Timeout fallback
                });
            } else if (type === 'image') {
                // Preload image
                const img = new Image();
                img.src = url;
            }

            state.clips.push(clip);
            updateDuration();
            renderTimeline();
            renderFrame();
        }

        function importFromCamera() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'video/*';
            input.capture = 'environment';
            input.onchange = (e) => handleFiles(e.target.files);
            input.click();
        }

        function updateDuration() {
            state.duration = state.clips.reduce((max, clip) => Math.max(max, clip.end), 0);
            const contentWidth = Math.max(window.innerWidth, (state.duration * state.scale) + window.innerWidth);
            document.getElementById('timelineContent').style.width = `${contentWidth}px`;
        }

        function renderTimeline() {
            const videoTrack = document.getElementById('videoTrack');
            const audioTrack = document.getElementById('audioTrack');
            const overlayTrack = document.getElementById('overlayTrack');
            
            videoTrack.innerHTML = '';
            audioTrack.innerHTML = '';
            overlayTrack.innerHTML = '';

            state.clips.forEach(clip => {
                const div = document.createElement('div');
                div.className = `clip-thumb ${clip.type} ${state.selectedClip === clip.id ? 'active' : ''}`;
                div.style.left = `${clip.start * state.scale}px`;
                div.style.width = `${Math.max(50, (clip.end - clip.start) * state.scale)}px`;
                div.dataset.id = clip.id;

                if (clip.type === 'video') {
                    // Generate thumbnail from video
                    const video = videoElements.get(clip.id);
                    if (video) {
                        const canvas = document.createElement('canvas');
                        canvas.width = 80;
                        canvas.height = 140;
                        const ctx = canvas.getContext('2d');
                        
                        // Try to draw thumbnail at 1 second mark
                        const drawThumb = () => {
                            try {
                                video.currentTime = Math.min(1, video.duration * 0.1);
                                video.onseeked = () => {
                                    ctx.drawImage(video, 0, 0, 80, 140);
                                    div.style.backgroundImage = `url(${canvas.toDataURL()})`;
                                    div.style.backgroundSize = 'cover';
                                    div.style.backgroundPosition = 'center';
                                };
                            } catch(e) {
                                // Fallback to solid color
                                div.style.background = '#333';
                            }
                        };
                        
                        if (video.readyState >= 2) {
                            drawThumb();
                        } else {
                            video.onloadeddata = drawThumb;
                        }
                    }
                } else if (clip.type === 'image') {
                    const img = document.createElement('img');
                    img.src = clip.url;
                    div.appendChild(img);
                }

                const duration = document.createElement('span');
                duration.className = 'clip-duration';
                duration.textContent = formatTime(clip.end - clip.start);
                div.appendChild(duration);

                div.onclick = (e) => {
                    e.stopPropagation();
                    selectClip(clip.id);
                };

                if (clip.type === 'audio') {
                    audioTrack.appendChild(div);
                } else if (clip.type === 'text' || clip.type === 'overlay') {
                    overlayTrack.appendChild(div);
                } else {
                    videoTrack.appendChild(div);
                }
            });

            renderRuler();
        }

        function renderRuler() {
            const ruler = document.getElementById('ruler');
            ruler.innerHTML = '';
            
            const steps = Math.ceil(state.duration / 5);
            for (let i = 0; i <= steps; i++) {
                const mark = document.createElement('div');
                mark.className = 'ruler-mark major';
                mark.style.left = `calc(50% + ${i * 5 * state.scale}px)`;
                ruler.appendChild(mark);
            }
        }

        function selectClip(id) {
            state.selectedClip = id;
            renderTimeline();
            
            if (state.tool === 'split') {
                splitClip(id);
            }
        }

        function setTool(tool) {
            state.tool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (tool === 'text') {
                addTextOverlay();
            }
        }

        function splitClip(id) {
            const clip = state.clips.find(c => c.id === id);
            if (!clip || state.currentTime <= clip.start || state.currentTime >= clip.end) {
                showToast('Move playhead over clip to split');
                return;
            }

            const splitPoint = state.currentTime - clip.start;
            const newClip = {
                ...clip,
                id: Date.now() + Math.random().toString(36).substr(2, 9),
                start: state.currentTime,
                trimStart: clip.trimStart + splitPoint
            };

            if (clip.type === 'video') {
                // Clone video element reference
                videoElements.set(newClip.id, videoElements.get(clip.id));
            }

            clip.end = state.currentTime;
            clip.trimEnd = clip.trimStart + splitPoint;

            state.clips.push(newClip);
            state.clips.sort((a, b) => a.start - b.start);
            
            updateDuration();
            renderTimeline();
            showToast('Clip split');
        }

        function togglePlayback() {
            state.isPlaying = !state.isPlaying;
            document.getElementById('playFab').textContent = state.isPlaying ? '⏸' : '▶';
            
            if (state.isPlaying) {
                // Sync all video elements
                syncVideos();
                playLoop();
            } else {
                cancelAnimationFrame(animationFrame);
                pauseAllVideos();
            }
        }

        function syncVideos() {
            state.clips.forEach(clip => {
                if (clip.type === 'video') {
                    const video = videoElements.get(clip.id);
                    if (video) {
                        const clipTime = state.currentTime - clip.start + clip.trimStart;
                        if (clipTime >= 0 && clipTime <= clip.duration) {
                            video.currentTime = clipTime;
                            if (state.isPlaying) video.play().catch(() => {});
                        }
                    }
                }
            });
        }

        function pauseAllVideos() {
            videoElements.forEach(video => {
                video.pause();
            });
        }

        function playLoop() {
            if (!state.isPlaying) return;
            
            state.currentTime += 0.033;
            
            if (state.currentTime >= state.duration) {
                state.currentTime = 0;
                state.isPlaying = false;
                document.getElementById('playFab').textContent = '▶';
                pauseAllVideos();
            }
            
            updatePlayhead();
            renderFrame();
            
            if (state.isPlaying) {
                animationFrame = requestAnimationFrame(playLoop);
            }
        }

        function renderFrame() {
            // Clear canvas with black
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Get active clips sorted by layer order (images/videos first, then overlays)
            const activeClips = state.clips.filter(c => 
                state.currentTime >= c.start && state.currentTime <= c.end
            ).sort((a, b) => {
                if (a.type === 'text' || a.type === 'overlay') return 1;
                if (b.type === 'text' || b.type === 'overlay') return -1;
                return 0;
            });

            // Draw background first (black if no video)
            let hasContent = false;

            activeClips.forEach(clip => {
                if (clip.type === 'video') {
                    const video = videoElements.get(clip.id);
                    if (video && video.readyState >= 2) {
                        const clipTime = state.currentTime - clip.start + clip.trimStart;
                        
                        // Only draw if within trimmed bounds
                        if (clipTime >= clip.trimStart && clipTime <= clip.trimEnd) {
                            // Ensure video is at correct time (approximate)
                            if (Math.abs(video.currentTime - clipTime) > 0.1 && state.isPlaying) {
                                video.currentTime = clipTime;
                            }
                            
                            drawMedia(video, 'cover');
                            hasContent = true;
                        }
                    }
                } else if (clip.type === 'image') {
                    const img = new Image();
                    img.src = clip.url;
                    if (img.complete) {
                        drawMedia(img, 'cover');
                        hasContent = true;
                    }
                }
            });

            // If no video content, show placeholder
            if (!hasContent) {
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Show timecode in center
                ctx.fillStyle = '#444';
                ctx.font = 'bold 60px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(formatTime(state.currentTime), canvas.width/2, canvas.height/2);
            }

            // Draw overlays (text, etc)
            activeClips.forEach(clip => {
                if (clip.type === 'text' && clip.text) {
                    ctx.save();
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 80px -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(0,0,0,0.8)';
                    ctx.shadowBlur = 20;
                    ctx.fillText(clip.text, canvas.width/2, canvas.height/2);
                    ctx.restore();
                }
            });

            // Watermark
            if (state.settings.watermark.enabled) {
                ctx.save();
                ctx.globalAlpha = state.settings.watermark.opacity;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px -apple-system, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(state.settings.watermark.text, canvas.width - 40, canvas.height - 40);
                ctx.restore();
            }

            // Countdown
            if (state.settings.countdown.enabled && state.currentTime < state.settings.countdown.duration) {
                const remaining = Math.ceil(state.settings.countdown.duration - state.currentTime);
                
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, 200, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 140px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(remaining, canvas.width/2, canvas.height/2);
                
                ctx.strokeStyle = '#0A84FF';
                ctx.lineWidth = 12;
                ctx.beginPath();
                const progress = state.currentTime / state.settings.countdown.duration;
                ctx.arc(canvas.width/2, canvas.height/2, 180, -Math.PI/2, 
                    (-Math.PI/2) + (Math.PI * 2 * progress));
                ctx.stroke();
                ctx.restore();
            }
        }

        function drawMedia(media, fit = 'cover') {
            const canvasAspect = canvas.width / canvas.height;
            let width = media.videoWidth || media.width;
            let height = media.videoHeight || media.height;
            const mediaAspect = width / height;

            let drawWidth, drawHeight, x, y;

            if (fit === 'cover') {
                if (canvasAspect > mediaAspect) {
                    drawWidth = canvas.width;
                    drawHeight = drawWidth / mediaAspect;
                    x = 0;
                    y = (canvas.height - drawHeight) / 2;
                } else {
                    drawHeight = canvas.height;
                    drawWidth = drawHeight * mediaAspect;
                    x = (canvas.width - drawWidth) / 2;
                    y = 0;
                }
            } else {
                if (canvasAspect < mediaAspect) {
                    drawWidth = canvas.width;
                    drawHeight = drawWidth / mediaAspect;
                } else {
                    drawHeight = canvas.height;
                    drawWidth = drawHeight * mediaAspect;
                }
                x = (canvas.width - drawWidth) / 2;
                y = (canvas.height - drawHeight) / 2;
            }

            ctx.drawImage(media, x, y, drawWidth, drawHeight);
        }

        function addTextOverlay() {
            const text = prompt('Enter text:', 'My Text');
            if (!text) return;

            state.clips.push({
                id: Date.now() + Math.random().toString(36).substr(2, 9),
                type: 'text',
                text: text,
                start: state.currentTime,
                end: state.currentTime + 3,
                duration: 3
            });

            updateDuration();
            renderTimeline();
            renderFrame();
            showToast('Text added');
        }

        function updatePlayhead() {
            const scroll = document.getElementById('timelineScroll');
            const centerOffset = window.innerWidth / 2;
            const position = (state.currentTime * state.scale);
            scroll.scrollLeft = position - centerOffset + 40;
        }

        // Modal Functions
        function openModal(type) {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById(`${type}Modal`).classList.add('active');
            
            if (type === 'media') renderMediaGrid();
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function renderMediaGrid() {
            const grid = document.getElementById('mediaGrid');
            grid.innerHTML = state.clips.map(clip => `
                <div class="media-cell ${state.selectedClip === clip.id ? 'selected' : ''}" onclick="jumpToClip('${clip.id}')">
                    ${clip.type === 'image' ? `<img src="${clip.url}">` : 
                      clip.type === 'video' ? `<div style="width:100%;height:100%;background:#222;display:flex;align-items:center;justify-content:center;">🎬</div>` : 
                      '<div style="padding: 20px;">🎵</div>'}
                    <div class="duration">${formatTime(clip.end - clip.start)}</div>
                </div>
            `).join('');
        }

        function jumpToClip(id) {
            const clip = state.clips.find(c => c.id === id);
            if (clip) {
                state.currentTime = clip.start;
                updatePlayhead();
                renderFrame();
                closeModals();
            }
        }

        // Settings
        function setWatermark(enabled) {
            state.settings.watermark.enabled = enabled;
            document.getElementById('watermarkText').style.display = enabled ? 'block' : 'none';
            renderFrame();
            updateUISegments(event.target);
        }

        function setCountdown(enabled) {
            state.settings.countdown.enabled = enabled;
            renderFrame();
            updateUISegments(event.target);
        }

        function updateUISegments(target) {
            const parent = target.parentElement;
            Array.from(parent.children).forEach(child => child.classList.remove('active'));
            target.classList.add('active');
        }

        function updateVolume(val) {
            state.settings.volume = val;
            videoElements.forEach(video => {
                video.volume = val / 100;
            });
        }

        function setResolution(res) {
            state.settings.resolution = res;
            updateUISegments(event.target);
        }

        // Export
        async function startExport() {
            closeModals();
            document.getElementById('exportOverlay').classList.add('active');
            
            const originalWidth = canvas.width;
            const originalHeight = canvas.height;
            
            // Set export resolution (9:16 aspect ratio)
            canvas.height = state.settings.resolution;
            canvas.width = (canvas.height * 9) / 16;
            
            const fps = 30;
            const duration = state.duration;
            const totalFrames = duration * fps;
            
            const stream = canvas.captureStream(fps);
            const mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: state.settings.resolution === 2160 ? 20000000 : 8000000
            });

            const chunks = [];
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `ProVideo_${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                // Cleanup
                canvas.width = originalWidth;
                canvas.height = originalHeight;
                renderFrame();
                
                document.getElementById('exportOverlay').classList.remove('active');
                showToast('Video saved!');
            };

            mediaRecorder.start();
            
            // Render frames
            let frame = 0;
            const exportInterval = setInterval(() => {
                if (frame >= totalFrames) {
                    clearInterval(exportInterval);
                    mediaRecorder.stop();
                    return;
                }

                state.currentTime = frame / fps;
                renderFrame();
                
                const progress = ((frame / totalFrames) * 100).toFixed(0);
                const circle = document.getElementById('progressCircle');
                const offset = 339.292 - (339.292 * progress / 100);
                circle.style.strokeDashoffset = offset;
                
                document.getElementById('exportDetail').textContent = `${progress}% complete`;
                
                frame++;
            }, 1000 / fps);
        }

        function cancelExport() {
            location.reload();
        }

        // Audio
        async function addVoiceOver() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const url = URL.createObjectURL(blob);
                    
                    const clip = {
                        id: Date.now() + Math.random().toString(36).substr(2, 9),
                        type: 'audio',
                        url: url,
                        start: state.currentTime,
                        end: state.currentTime + 10,
                        duration: 10
                    };
                    
                    state.clips.push(clip);
                    updateDuration();
                    renderTimeline();
                    showToast('Voiceover added');
                };
                
                mediaRecorder.start();
                showToast('Recording... (tap stop in export overlay to stop)');
                
                // Auto-stop after 60s
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        stream.getTracks().forEach(track => track.stop());
                    }
                }, 60000);
                
            } catch (err) {
                showToast('Microphone access denied');
            }
        }

        function addMusic() {
            document.getElementById('fileInput').accept = 'audio/*';
            document.getElementById('fileInput').click();
            setTimeout(() => {
                document.getElementById('fileInput').accept = 'video/*,audio/*,image/*';
            }, 100);
        }

        // Utilities
        function formatTime(seconds) {
            if (!isFinite(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 100);
            return `${m}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // Cleanup on visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && state.isPlaying) {
                togglePlayback();
            }
        });
    </script>
</body>
</html>
